syntax = "proto3";

package identity.v1;

option go_package = "github.com/PaPaSmUrFiK/MarketFlow/marketplace-proto/gen/go/identity/v1;identityv1";

import "identity/v1/common.proto";

service AdminService {

  // ── Applications ──────────────────────────────────────────────────────────
  rpc CreateApplication (CreateApplicationRequest) returns (CreateApplicationResponse);

  // ── Users ─────────────────────────────────────────────────────────────────
  rpc CreateUser     (CreateUserRequest)     returns (CreateUserResponse);
  rpc BlockUser      (BlockUserRequest)      returns (BlockUserResponse);
  rpc UnblockUser    (UnblockUserRequest)    returns (UnblockUserResponse);
  rpc DeleteUser     (DeleteUserRequest)     returns (DeleteUserResponse);
  rpc ListUsers      (ListUsersRequest)      returns (ListUsersResponse);
  rpc GetUserDetails (GetUserDetailsRequest) returns (GetUserDetailsResponse);

  // ── Roles ─────────────────────────────────────────────────────────────────
  rpc CreateRole        (CreateRoleRequest)        returns (CreateRoleResponse);
  rpc DeleteRole        (DeleteRoleRequest)        returns (DeleteRoleResponse);
  rpc AssignRoleToUser  (AssignRoleToUserRequest)  returns (AssignRoleToUserResponse);
  rpc RemoveRoleFromUser(RemoveRoleFromUserRequest) returns (RemoveRoleFromUserResponse);

  // ── Permissions ───────────────────────────────────────────────────────────
  rpc CreatePermission          (CreatePermissionRequest)          returns (CreatePermissionResponse);
  rpc DeletePermission          (DeletePermissionRequest)          returns (DeletePermissionResponse);
  rpc AssignPermissionToRole    (AssignPermissionToRoleRequest)    returns (AssignPermissionToRoleResponse);
  rpc RemovePermissionFromRole  (RemovePermissionFromRoleRequest)  returns (RemovePermissionFromRoleResponse);
}

// ── Applications ─────────────────────────────────────────────────────────────

message CreateApplicationRequest {
  string code = 1; // уникальный код: buywise-web, buywise-admin
  string name = 2;
}

message CreateApplicationResponse {
  Application application = 1;
}

// ── Users ─────────────────────────────────────────────────────────────────────

message CreateUserRequest {
  string app_id   = 1; // в какое приложение регистрируем
  string email    = 2;
  string password = 3;
}

message CreateUserResponse {
  User user = 1;
}

message BlockUserRequest {
  string user_id = 1;
}

message BlockUserResponse {
  bool success = 1;
}

message UnblockUserRequest {
  string user_id = 1;
}

message UnblockUserResponse {
  bool success = 1;
}

message DeleteUserRequest {
  string user_id = 1;
}

message DeleteUserResponse {
  bool success = 1;
}

// ListUsers — список пользователей в приложении с пагинацией
message ListUsersRequest {
  string     app_id     = 1;
  Pagination pagination = 2;
}

message ListUsersResponse {
  repeated User users     = 1;
  PageInfo      page_info = 2;
}

// GetUserDetails — полный профиль пользователя с ролями и permissions
message GetUserDetailsRequest {
  string app_id  = 1;
  string user_id = 2;
}

message GetUserDetailsResponse {
  UserProfile profile = 1;
}

// ── Roles ──────────────────────────────────────────────────────────────────────

message CreateRoleRequest {
  string app_id      = 1;
  string code        = 2; // ADMIN, MODERATOR, SELLER
  string description = 3;
}

message CreateRoleResponse {
  Role role = 1;
}

message DeleteRoleRequest {
  string app_id    = 1;
  string role_code = 2;
}

message DeleteRoleResponse {
  bool success = 1;
}

// AssignRoleToUser — назначить роль пользователю в приложении
message AssignRoleToUserRequest {
  string app_id    = 1;
  string user_id   = 2;
  string role_code = 3;
}

message AssignRoleToUserResponse {
  bool success = 1;
}

// RemoveRoleFromUser — снять роль с пользователя
message RemoveRoleFromUserRequest {
  string app_id    = 1;
  string user_id   = 2;
  string role_code = 3;
}

message RemoveRoleFromUserResponse {
  bool success = 1;
}

// ── Permissions ────────────────────────────────────────────────────────────────

message CreatePermissionRequest {
  string app_id      = 1;
  string code        = 2; // PRODUCT:READ, ORDER:WRITE
  string description = 3;
}

message CreatePermissionResponse {
  Permission permission = 1;
}

message DeletePermissionRequest {
  string app_id          = 1;
  string permission_code = 2;
}

message DeletePermissionResponse {
  bool success = 1;
}

// AssignPermissionToRole — добавить разрешение к роли
message AssignPermissionToRoleRequest {
  string app_id          = 1;
  string role_code       = 2;
  string permission_code = 3;
}

message AssignPermissionToRoleResponse {
  bool success = 1;
}

// RemovePermissionFromRole — убрать разрешение из роли
message RemovePermissionFromRoleRequest {
  string app_id          = 1;
  string role_code       = 2;
  string permission_code = 3;
}

message RemovePermissionFromRoleResponse {
  bool success = 1;
}
